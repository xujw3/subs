name: Fetch Subscriptions Source

# 触发条件
on:
  workflow_dispatch:

  schedule:
    - cron: '*/45 * * * *'
  watch:
    types: started
  # - cron: '0 3,12 * * *'
  # -'0 */1 * * *'
  # -该规则表示每天从 0 点开始，每隔 1 个小时执行一次任务
  # 表达式生成  https://crontab.guru/

 
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:

    - name: 迁出代码
      uses: actions/checkout@v3
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: 安装Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'
      
    - name: 加载缓存
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/run_in_Actions/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
      
    - name: 设置时区
      run: sudo timedatectl set-timezone 'Asia/Shanghai'

    - name: 安装依赖
      run: |
        pip install -r ./requirements.txt

    - name: 执行任务
      run: |
        python ./main.py

    - name: 更新Substore
      env:
        # 直接填入你的真实URL，注意加上引号。
        # 如果仓库公开且URL敏感，请务必改用 ${{ vars.APIURL }} 或改回 secrets
        APIURL: "https://你的真实API地址.com" 
      run: |
        python ./sub.py

    - name: Commit and Push
      run: |
        # 建议使用 GitHub Actions 官方机器人账号信息
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add .   #这是pre_check.py定义的输出路径
        
        # || exit 0 的作用是：如果没有文件发生更改，commit 失败也不会导致整个 Action 标红报错
        git commit -m "🍀 爬取订阅源 $(date '+%Y-%m-%d %H:%M:%S')" || exit 0
        
        # 直接推送，无需使用第三方 action
        git push
